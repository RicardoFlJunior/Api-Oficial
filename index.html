<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IP Solution · Painel de Migração — API Oficial do WhatsApp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --ink:#0B2545;
    --ink-2:#123B6D;
    --paper:#F7F9FC;
    --white:#FFFFFF;
    --blue:#1565D8;
    --blue-light:#EAF2FE;
    --blue-mid:#5B93E0;
    --orange:#FF6A13;
    --orange-deep:#C24E08;   /* accessible orange for text/small marks (>=4.5:1 on paper & white) */
    --orange-light:#FFEDDD;
    --orange-mid:#FFB27A;
    --slate:#5B6472;
    --slate-light:#8A93A3;
    --line:#E1E6EE;
    --red:#D64545;
    --green:#1E8E5A;
    --font-display:'Archivo',sans-serif;
    --font-body:'IBM Plex Sans',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
    --rail-w:76px;
    --ease:cubic-bezier(.16,1,.3,1);
    --ease-soft:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    font-family:var(--font-body);
    color:var(--ink);
    background:var(--paper);
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--orange);color:#fff;}
  a{color:inherit;}
  img{max-width:100%;display:block;}

  /* ---------- top progress bar ---------- */
  .progress-track{
    position:fixed;top:0;left:0;right:0;height:3px;
    background:var(--line);z-index:200;
  }
  .progress-fill{
    height:100%;width:0%;
    background:linear-gradient(90deg,var(--blue),var(--orange));
    transition:width .08s linear;
  }

  /* ---------- station rail (desktop) ---------- */
  .rail{
    position:fixed;left:0;top:0;bottom:0;width:var(--rail-w);
    display:flex;flex-direction:column;align-items:center;
    padding:74px 0 20px;
    z-index:150;
    border-right:1px solid var(--line);
    background:rgba(247,249,252,.88);
    backdrop-filter:blur(6px);
  }
  .rail-scroll{
    flex:1;display:flex;flex-direction:column;align-items:center;
    gap:2px;overflow:hidden;justify-content:flex-start;
  }
  .rail-dot-wrap{
    position:relative;width:100%;padding:7px 0;
    display:flex;justify-content:center;
  }
  .rail-dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--line);border:none;cursor:pointer;
    transition:all .2s ease;padding:0;
  }
  .rail-dot-wrap::before{
    content:'';position:absolute;left:50%;top:-2px;bottom:-2px;
    width:1px;background:var(--line);transform:translateX(-50%);z-index:-1;
  }
  .rail-dot-wrap:first-child::before{top:50%;}
  .rail-dot-wrap:last-child::before{bottom:50%;}
  .rail-dot.active{background:var(--orange);width:12px;height:12px;box-shadow:0 0 0 4px var(--orange-light);}
  .rail-label{
    position:absolute;left:calc(var(--rail-w) - 4px);top:50%;transform:translateY(-50%);
    background:var(--ink);color:#fff;font-family:var(--font-mono);font-size:13.12px;font-weight:600;
    padding:5px 10px;border-radius:5px;white-space:nowrap;
    opacity:0;pointer-events:none;transition:opacity .15s ease, transform .15s ease;
    transform-origin:left center;
  }
  .rail-dot-wrap:hover .rail-label{opacity:1;transform:translateY(-50%) translateX(4px);}
  .rail-readout{
    font-family:var(--font-mono);font-size:12.5px;color:var(--slate-light);
    letter-spacing:.06em;margin-top:10px;text-align:center;
  }
  .rail-brand{
    font-family:var(--font-display);font-size:12px;font-weight:800;
    letter-spacing:.04em;line-height:1.15;text-align:center;
    width:100%;padding:0 4px;margin-bottom:16px;
  }
  .rail-brand .b-ip{color:var(--ink);}
  .rail-brand .b-sol{color:var(--orange-deep);}

  main{margin-left:var(--rail-w);}
  @media (max-width:900px){
    .rail{display:none;}
    main{margin-left:0;}
  }

  .wrap{max-width:1080px;margin:0 auto;padding:0 32px;}
  @media (max-width:640px){.wrap{padding:0 20px;}}

  /* ---------- kickers / headings ---------- */
  .kicker{
    display:inline-flex;align-items:center;gap:8px;
    font-family:var(--font-mono);font-size:14.38px;font-weight:600;
    letter-spacing:.1em;text-transform:uppercase;color:var(--orange);
    margin-bottom:16px;
  }
  .kicker::before{content:'';width:16px;height:1px;background:var(--orange);}
  .kicker.on-dark{color:var(--orange-mid);}
  .kicker.on-dark::before{background:var(--orange-mid);}

  h1,h2,h3{font-family:var(--font-display);font-weight:800;letter-spacing:-.01em;margin:0;}
  .sec-title{font-size:clamp(26px,3.4vw,38px);margin-bottom:14px;line-height:1.08;}
  .sec-sub{font-size:16px;color:var(--slate);max-width:680px;line-height:1.55;margin-bottom:8px;}
  .sec-head{
    display:flex;justify-content:space-between;align-items:flex-start;gap:24px;
    margin-bottom:36px;
  }

  /* ---------- info / FAQ button (mascot icon, no background plate) ---------- */
  .info-btn{
    /* top robot removed by request — kept in DOM only as the image source
       cloned into the larger bottom robot; never shown */
    display:none !important;
  }
  .mascot-icon{
    width:40px;height:auto;display:block;pointer-events:none;
    filter:drop-shadow(0 1px 1px rgba(11,37,69,.4)) drop-shadow(0 2px 8px rgba(11,37,69,.28));
    transition:filter .22s var(--ease, ease);
  }
  .info-btn.on-dark .mascot-icon{
    filter:drop-shadow(0 0 1px rgba(255,255,255,.55)) drop-shadow(0 2px 10px rgba(255,255,255,.28));
  }
  .info-btn:hover .mascot-icon{filter:drop-shadow(0 2px 3px rgba(255,106,19,.55)) drop-shadow(0 4px 14px rgba(255,106,19,.35));}
  .info-btn.on-dark:hover .mascot-icon{filter:drop-shadow(0 0 2px rgba(255,255,255,.85)) drop-shadow(0 4px 14px rgba(255,106,19,.4));}
  .info-btn.active .mascot-icon{filter:drop-shadow(0 2px 4px rgba(255,106,19,.6)) drop-shadow(0 6px 16px rgba(255,106,19,.45));}

  /* thought bubble badge: signals "click me for answers" */
  .think-badge{
    position:absolute;top:2px;right:2px;z-index:3;
    width:22px;height:22px;border-radius:50% 50% 4px 50%;
    background:var(--orange);color:#fff;
    font-family:var(--font-display);font-weight:800;font-size:15px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 10px -2px rgba(255,106,19,.55), 0 0 0 2.5px var(--paper);
    animation:thinkPulse 2.6s ease-in-out infinite;
    pointer-events:none;
  }
  section.dark .think-badge{box-shadow:0 4px 10px -2px rgba(255,106,19,.55), 0 0 0 2.5px var(--ink);}
  .think-badge::before, .think-badge::after{
    content:'';position:absolute;background:var(--orange);border-radius:50%;
  }
  .think-badge::before{width:7px;height:7px;bottom:-5px;left:-1px;}
  .think-badge::after{width:4px;height:4px;bottom:-10px;left:-5px;}
  .info-btn:hover .think-badge, .info-btn.active .think-badge{animation-play-state:paused;transform:scale(1.15);}
  @keyframes thinkPulse{
    0%,100%{transform:scale(1) rotate(0deg);}
    50%{transform:scale(1.14) rotate(-4deg);}
  }
  @media (prefers-reduced-motion: reduce){
    .think-badge{animation:none;}
  }

  .faq-panel{
    max-height:0;overflow:hidden;opacity:0;
    transition:max-height .32s ease, opacity .28s ease, margin .32s ease;
    margin:0 0 0 0;
  }
  .faq-panel.open{max-height:600px;opacity:1;margin-bottom:30px;}
  .faq-inner{
    background:var(--blue-light);border:1px solid #cfe0fa;border-radius:14px;
    padding:22px 26px;display:grid;gap:16px;
  }
  .faq-inner.on-dark{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.16);}
  .faq-item .q{
    font-family:var(--font-mono);font-weight:600;font-size:15.62px;color:var(--blue);
    display:flex;gap:8px;margin-bottom:4px;
  }
  .faq-inner.on-dark .faq-item .q{color:var(--orange-mid);}
  .faq-item .a{font-size:17.5px;color:var(--ink);line-height:1.5;}
  .faq-inner.on-dark .faq-item .a{color:#DCE6F7;}
  .faq-item .q .qmark{color:var(--orange);}

  /* ---------- sections generic ---------- */
  section{padding:96px 0;position:relative;}
  section.dark{background:var(--ink);color:#fff;}
  section.dark .sec-sub{color:#B9C9E6;}
  .divider{height:1px;background:var(--line);max-width:1080px;margin:0 auto;}

  /* ---------- hero ---------- */
  .hero{
    min-height:100vh;display:flex;flex-direction:column;justify-content:center;
    background:
      radial-gradient(900px 500px at 85% -10%, rgba(255,106,19,.14), transparent 60%),
      radial-gradient(700px 500px at -10% 110%, rgba(21,101,216,.5), transparent 60%),
      var(--ink);
    color:#fff;padding:140px 0 80px;
  }
  .hero-tag{
    font-family:var(--font-mono);font-size:15px;letter-spacing:.14em;color:var(--orange-mid);
    text-transform:uppercase;margin-bottom:22px;display:flex;align-items:center;gap:10px;
  }
  .hero-tag .dot{width:7px;height:7px;border-radius:50%;background:var(--orange);animation:pulse 1.8s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  /* centered cover composition */
  .hero > .wrap{text-align:center;}
  .hero-tag{justify-content:center;}
  .hero h1{
    font-size:clamp(42px,7vw,76px);line-height:1.0;max-width:940px;
    letter-spacing:-.025em;margin-left:auto;margin-right:auto;
  }
  .hero h1 em{font-style:normal;color:var(--orange-mid);}
  .hero p{font-size:19.5px;color:#D6E2F5;max-width:640px;margin:24px auto 0;line-height:1.6;}
  .hero-stats{display:flex;gap:0;margin-top:52px;flex-wrap:wrap;justify-content:center;border-top:1px solid rgba(255,255,255,.14);padding-top:28px;}
  .hstat{padding-right:44px;margin-right:44px;border-right:1px solid rgba(255,255,255,.14);}
  .hstat:last-child{border-right:none;padding-right:0;margin-right:0;}
  .hstat b{display:block;font-family:var(--font-display);font-size:40px;font-weight:800;letter-spacing:-.02em;}
  .hstat span{font-family:var(--font-mono);font-size:13.75px;color:#9FB3D6;letter-spacing:.04em;}
  .hero-scroll{margin-top:56px;font-family:var(--font-mono);font-size:13.75px;color:#8FA8CE;display:flex;align-items:center;justify-content:center;gap:10px;}
  .hero-scroll .arrow{animation:bob 1.6s infinite;}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(5px);}}

  @keyframes heroIn{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
  .hero-logo{animation:heroIn .8s var(--ease) both;}
  .hero-tag{animation:heroIn .8s var(--ease) .08s both;}
  .hero h1{animation:heroIn .9s var(--ease) .16s both;}
  .hero > .wrap > p{animation:heroIn .9s var(--ease) .26s both;}
  .hero-stats{animation:heroIn .9s var(--ease) .36s both;}
  .hero-scroll{animation:heroIn .9s var(--ease) .48s both;}

  /* ---------- pills ---------- */
  .pill{
    display:inline-flex;align-items:center;gap:6px;
    font-family:var(--font-mono);font-size:13.75px;font-weight:600;
    padding:6px 13px;border-radius:20px;letter-spacing:.02em;
  }
  .pill.blue{background:var(--blue-light);color:var(--blue);}
  .pill.orange{background:var(--orange-light);color:#9A4200;}
  .pill.ghost{background:rgba(255,255,255,.08);color:#DCE6F7;border:1px solid rgba(255,255,255,.2);}

  /* ---------- grid cards ---------- */
  .grid{display:grid;gap:18px;}
  .grid.c2{grid-template-columns:repeat(2,1fr);}
  .grid.c3{grid-template-columns:repeat(3,1fr);}
  .grid.c4{grid-template-columns:repeat(4,1fr);}
  @media (max-width:900px){.grid.c2,.grid.c3,.grid.c4{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:600px){.grid.c2,.grid.c3,.grid.c4{grid-template-columns:1fr;}}

  .card{
    background:var(--white);border:1px solid var(--line);border-radius:14px;
    padding:26px;
  }
  .card .icon{
    width:44px;height:44px;border-radius:11px;background:var(--blue-light);
    display:flex;align-items:center;justify-content:center;margin-bottom:16px;
    font-size:23.75px;
  }
  .card .icon.o{background:var(--orange-light);}
  .card h4{font-family:var(--font-display);font-size:19.38px;font-weight:700;margin-bottom:7px;}
  .card p{font-size:16.88px;color:var(--slate);line-height:1.55;margin:0;}

  /* ---------- comparativo ---------- */
  .compare{display:grid;grid-template-columns:1fr 1fr;gap:22px;}
  @media (max-width:760px){.compare{grid-template-columns:1fr;}}
  .col-official{background:var(--ink);border-radius:16px;padding:32px;color:#fff;}
  .col-unofficial{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:32px;}
  .compare h3{font-size:23.75px;margin-bottom:22px;}
  .compare ul{list-style:none;margin:0;padding:0;display:grid;gap:16px;}
  .compare li{display:flex;gap:12px;align-items:flex-start;font-size:17.5px;line-height:1.5;}
  .check{
    flex:none;width:22px;height:22px;border-radius:50%;background:var(--orange);
    color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;margin-top:1px;
  }
  .cross{
    flex:none;width:22px;height:22px;border-radius:50%;background:#EEF0F4;
    color:#9AA3B2;font-size:15px;display:flex;align-items:center;justify-content:center;margin-top:1px;
  }
  .col-official li{color:#E6EDF9;}
  .col-unofficial li{color:var(--slate);}

  /* ---------- phone mockup ---------- */
  .phone{
    width:290px;background:var(--ink);border-radius:34px;padding:12px;
    box-shadow:0 30px 60px -20px rgba(11,37,69,.5);
  }
  .phone-screen{background:#F4F7FB;border-radius:24px;overflow:hidden;}
  .phone-head{
    background:var(--blue);padding:16px 16px 14px;display:flex;align-items:center;gap:10px;
  }
  .phone-head .av{width:34px;height:34px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18.75px;}
  .phone-head .name{color:#fff;font-weight:600;font-size:16.25px;}
  .phone-head .status{color:#D8E4FA;font-size:13.12px;}
  .phone-body{padding:16px;min-height:260px;}
  .bubble{
    background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 13px;
    font-size:15.62px;margin-bottom:12px;line-height:1.4;box-shadow:0 2px 6px rgba(11,37,69,.04);
  }
  .wa-btn{
    display:flex;align-items:center;gap:8px;background:var(--blue-light);
    border:1px solid var(--blue-mid);color:var(--blue);font-weight:700;font-size:15px;
    padding:11px 14px;border-radius:20px;margin-bottom:9px;
  }
  .wa-btn .arrow{font-size:16.25px;}

  /* ---------- steps ---------- */
  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;position:relative;}
  @media (max-width:760px){.steps{grid-template-columns:1fr;}}
  .step{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:30px 24px;text-align:center;position:relative;}
  .step .num{
    width:52px;height:52px;border-radius:50%;background:var(--ink);color:#fff;
    display:flex;align-items:center;justify-content:center;font-family:var(--font-display);
    font-weight:800;font-size:23.75px;margin:-52px auto 18px;border:5px solid var(--paper);
  }
  .step h4{font-family:var(--font-display);font-size:19.38px;margin-bottom:6px;}
  .step p{font-size:16.25px;color:var(--slate);margin:0;}

  /* ---------- category cards w/ mockup bubble ---------- */
  .cat-card{background:var(--white);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  /* colored header with blurred photo — same treatment as the criteria cards (page 11) */
  .cat-top{
    position:relative;overflow:hidden;isolation:isolate;
    padding:22px 18px 18px;text-align:center;color:#fff;
  }
  .cat-top::before{
    content:'';position:absolute;inset:-12px;z-index:-2;
    background-image:var(--cat-bg);background-size:cover;background-position:center;
    filter:blur(7px);
  }
  .cat-top::after{content:'';position:absolute;inset:0;z-index:-1;}
  .cat-top.blue{background:var(--blue);}
  .cat-top.blue::after{background:rgba(21,101,216,.78);}
  .cat-top.orange{background:var(--orange-deep);}
  .cat-top.orange::after{background:rgba(194,78,8,.80);}
  .cat-top .icon{
    width:46px;height:46px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 10px;font-size:23.75px;
  }
  .cat-top h4{font-family:var(--font-display);font-size:18.75px;font-weight:700;color:#fff;margin:0;}
  .cat-body{padding:24px;}
  .cat-body .icon{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:23.75px;}
  .cat-body h4{text-align:center;font-family:var(--font-display);font-size:18.75px;margin-bottom:10px;}
  .cat-body .desc{text-align:center;font-size:15.62px;color:var(--slate);margin-bottom:16px;line-height:1.5;min-height:52px;}
  .mini-bubble{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:14px;}
  .mini-tag{display:inline-block;font-family:var(--font-mono);font-size:11.25px;font-weight:700;color:#fff;padding:3px 8px;border-radius:8px;margin-bottom:6px;}
  .mini-bubble p{font-size:13.75px;margin:0;color:var(--ink);}
  .cat-cost{text-align:center;font-size:14.38px;font-weight:700;padding-top:12px;border-top:1px solid var(--line);}

  /* ---------- stat cards ---------- */
  .stat-card{background:var(--ink);border-radius:14px;padding:26px;color:#fff;text-align:center;}
  .stat-card .icon{width:44px;height:44px;border-radius:11px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:22.5px;margin:0 auto 20px;}
  .stat-card b{display:block;font-family:var(--font-display);font-size:37.5px;font-weight:800;}
  .stat-card span{font-family:var(--font-mono);font-size:13.75px;color:#B9C9E6;}

  /* ---------- highlight/callout ---------- */
  .callout{
    background:var(--white);border:1px solid var(--line);border-radius:14px;padding:24px 28px;
  }
  .callout h4{font-family:var(--font-display);font-size:18.12px;margin-bottom:14px;}
  .callout ul{list-style:none;margin:0;padding:0;display:grid;gap:11px;}
  .callout li{font-size:16.25px;color:var(--slate);display:flex;gap:9px;line-height:1.5;}
  .bullet-dot{flex:none;width:5px;height:5px;border-radius:50%;background:var(--orange);margin-top:7px;}

  /* ---------- dedicated importance banner (no alcada) ---------- */
  .banner-points{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:44px;}
  @media (max-width:700px){.banner-points{grid-template-columns:1fr;}}
  .banner-point{
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.16);border-radius:12px;
    padding:18px 20px;display:flex;gap:14px;align-items:flex-start;
  }
  .banner-point .ic{flex:none;width:34px;height:34px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:18.75px;}
  .banner-point p{font-size:16.88px;color:#E6EDF9;margin:0;line-height:1.5;}

  .chart-card{
    background:var(--white);border:1px solid var(--line);border-radius:16px;padding:26px;
  }
  .chart-card.on-dark{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.16);}
  .chart-card h4{font-family:var(--font-display);font-size:18.12px;margin-bottom:4px;}
  .chart-card .note{font-size:14.38px;color:var(--slate-light);font-family:var(--font-mono);margin-bottom:18px;}
  .chart-card.on-dark .note{color:#9FB3D6;}
  .chart-card.on-dark h4{color:#fff;}

  .alcada-layout{display:grid;grid-template-columns:1.1fr .9fr;gap:40px;align-items:center;margin-top:10px;}
  @media (max-width:860px){.alcada-layout{grid-template-columns:1fr;}}

  .historico-layout{display:grid;grid-template-columns:1.3fr 1fr;gap:32px;}
  @media (max-width:860px){.historico-layout{grid-template-columns:1fr;}}

  /* before/after (historico) */
  .ba{display:grid;gap:16px;}
  .ba-card{border-radius:14px;padding:22px 24px;display:flex;gap:16px;align-items:flex-start;}
  .ba-card.before{background:var(--blue-light);}
  .ba-card.after{background:var(--orange-light);}
  .ba-card .ic{flex:none;width:40px;height:40px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:21.25px;}
  .ba-card h5{font-family:var(--font-display);font-size:17.5px;margin:0 0 5px;}
  .ba-card.after h5{color:#9A4200;}
  .ba-card.before h5{color:var(--ink-2);}
  .ba-card p{margin:0;font-size:15.62px;color:var(--slate);line-height:1.5;}
  .ba-card p + p{margin-top:10px;}

  /* ---------- 3 col restricao ---------- */
  .risk-grid{display:grid;grid-template-columns:1fr 1fr 1.1fr;gap:18px;}
  @media (max-width:900px){.risk-grid{grid-template-columns:1fr;}}
  .risk-col{border-radius:14px;padding:24px;}
  .risk-col.plain{background:var(--white);border:1px solid var(--line);}
  .risk-col.dark2{background:var(--ink);}
  .risk-col h4{font-family:var(--font-display);font-size:17.5px;margin-bottom:16px;}
  .risk-col.dark2 h4{color:#fff;}
  .risk-col ul{list-style:none;margin:0;padding:0;display:grid;gap:13px;}
  .risk-col li{display:flex;gap:9px;font-size:15.62px;line-height:1.5;color:var(--slate);}
  .risk-col.dark2 li{color:#E6EDF9;}
  .risk-ic{flex:none;font-size:15px;margin-top:2px;}

  /* criterios grouped */
  .crit-card{background:var(--white);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  .crit-head{padding:22px 18px 18px;text-align:center;color:#fff;}
  .crit-head.a{background:var(--ink);}
  .crit-head.b{background:var(--blue);}
  .crit-head .bubble-ic{width:42px;height:42px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:21.25px;margin:0 auto 10px;}
  .crit-head h4{font-family:var(--font-display);font-size:16.88px;font-weight:700;}
  .crit-list{list-style:none;margin:0;padding:18px;display:grid;gap:14px;}
  .crit-list li{display:flex;gap:9px;font-size:15.62px;color:var(--ink);align-items:flex-start;}
  .crit-list li .c{color:var(--orange);flex:none;}

  /* footer */
  footer{background:var(--ink);color:#fff;padding:70px 0 40px;}
  .footer-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:30px;padding-bottom:36px;border-bottom:1px solid rgba(255,255,255,.12);}

  /* closing CTAs (last page) */
  .cta-row{display:flex;flex-wrap:wrap;gap:16px;margin-top:40px;}
  .cta-btn{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:17px 26px;border-radius:12px;
    font-family:var(--font-display);font-weight:700;font-size:16.5px;
    text-decoration:none;cursor:pointer;
    transition:transform .22s var(--ease), box-shadow .22s var(--ease), background .22s var(--ease);
  }
  .cta-btn .cta-ic{font-size:17px;line-height:1;}
  /* ink on vivid orange = 5.4:1 — keeps the brand orange and stays readable
     (white on --orange would only reach 2.9:1) */
  .cta-btn.primary{
    background:var(--orange);color:var(--ink);
    box-shadow:0 10px 24px -8px rgba(255,106,19,.65), inset 0 1px 0 rgba(255,255,255,.28);
  }
  .cta-btn.primary:hover{transform:translateY(-3px);box-shadow:0 16px 32px -8px rgba(255,106,19,.75), inset 0 1px 0 rgba(255,255,255,.22);}
  .cta-btn.ghost{
    background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(255,255,255,.22);
  }
  .cta-btn.ghost:hover{transform:translateY(-3px);background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.4);}
  .cta-btn:active{transform:translateY(-1px);}
  @media (prefers-reduced-motion: reduce){.cta-btn{transition:none;}}
  .brand-badge{
    display:inline-flex;align-items:center;gap:10px;background:var(--orange);color:#fff;
    font-family:var(--font-mono);font-weight:700;font-size:15px;padding:9px 16px;border-radius:20px;
  }
  footer .fnote{font-size:15px;color:#8FA8CE;margin-top:44px;font-family:var(--font-mono);}

  .to-top{
    position:fixed;right:26px;bottom:26px;width:46px;height:46px;border-radius:50%;
    background:var(--ink);color:#fff;border:none;cursor:pointer;font-size:20px;
    display:flex;align-items:center;justify-content:center;z-index:180;
    box-shadow:0 10px 24px -8px rgba(11,37,69,.5);opacity:0;pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
  }
  .to-top.show{opacity:1;pointer-events:auto;}
  .to-top:hover{background:var(--orange);}
